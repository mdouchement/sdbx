description: Opencode box for..
# The directory where all the home of the container is stored (default: ~/.local/share/sdbx/<name>)
# It will be mount as volume: ~/.local/share/sdbx/<name>:~/:rw
# data_dir: ~/.local/share/sdbx/opencode
# The image name in the local registry. By default it's derived on the name of the YAML file.
# But you can define a specific name so you can share the same image for several opencode boxes (reduce filesystem usage).
# local_image: opencode
create:
  ask_before_running: false
  image: docker.io/library/archlinux
  # environment:
  #   - MY_VAR1=TROLOLO LO?
  #   - MY_FORWARDED_VAR1=$MY_HOST_VAR1
  #   - MY_FORWARDED_VAR2=${MY_HOST_VAR2}
  shell_script: |-
    # Launched as root
    pacman-key --init
    pacman --noconfirm -Syu
    pacman --noconfirm --needed -S sudo bash ripgrep opencode

    pacman --noconfirm --needed -S nodejs npm
    # Install as "host" user (e.g. UID: 1000)
    su -c 'npx get-shit-done-cc@latest' ${container_user_name}

    # Let's say we want to do some Golang dev
    pacman --noconfirm --needed -S go
    su -c 'go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest' ${container_user_name}

    # Let's say we want to do some Rust dev
    pacman --noconfirm --needed -S rustup
    rustup install stable
update:
  ask_before_running: false
  # environment:
  #   - MY_VAR1=TROLOLO LO?
  #   - MY_FORWARDED_VAR1=$MY_HOST_VAR1
  #   - MY_FORWARDED_VAR2=${MY_HOST_VAR2}
  shell_script: |-
    # Launched as current user
    sudo pacman --noconfirm -Syu
    npx get-shit-done-cc@latest
    go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
    rustup update
run:
  ask_before_running: true
  command: opencode
  volumes:
    - ~/.opencode:~/.opencode:rw,U
  environment:
    - MY_VAR1=TROLOLO LO?
    - MY_FORWARDED_VAR1=$MY_HOST_VAR1
    - MY_FORWARDED_VAR2=${MY_HOST_VAR2}
